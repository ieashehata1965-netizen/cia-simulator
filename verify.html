<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificate Verification</title>

<style>

body{
    font-family: Tahoma;
    margin:0;
    background: linear-gradient(135deg,#f6f2e7,#efe2c1,#f8f5ea);
}

.container{
    max-width:700px;
    margin:auto;
    padding:20px;
}

.card{
    background:#fff;
    padding:25px;
    border-radius:18px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
    text-align:center;
}

h1{
    color:#7a5a12;
}

input,button{
    width:100%;
    padding:12px;
    margin:10px 0;
    font-size:16px;
    border-radius:10px;
    border:1px solid #ddd;
}

button{
    background:#b08d3c;
    color:#fff;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

.result{
    margin-top:20px;
    font-size:18px;
    line-height:1.8;
}

.valid{
    color:green;
    font-weight:bold;
}

.invalid{
    color:red;
    font-weight:bold;
}

.small{
    font-size:13px;
    color:#666;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Certificate Verification System</h1>

<p class="small">
Internal Audit & GRC Professional Academy
</p>

<input id="certId" placeholder="Enter Certificate ID">

<button onclick="verify()">Verify Certificate</button>

<div id="result" class="result"></div>

</div>

</div>

<script>

/* ===============================
   DEMO DATABASE (مؤقت)
   لاحقًا نربطه بملف أو سيرفر
================================= */

const fakeDB = {
    // مثال شهادة
    "GRC- CIA -12345678-ABCDE": {
        name: "Test User",
        track: "CIA",
        score: 8,
        total: 10,
        percent: 80,
        status: "VALID"
    }
};

/* =============================== */

function verify(){

    let id = document.getElementById("certId").value.trim();

    let result = document.getElementById("result");

    if(!id){
        result.innerHTML = "<span class='invalid'>Please enter Certificate ID</span>";
        return;
    }

    let data = fakeDB[id];

    if(!data){

        result.innerHTML = `
        <span class="invalid">❌ INVALID CERTIFICATE</span><br>
        This certificate is not found or has been tampered with.
        `;
        return;
    }

    result.innerHTML = `
        <span class="valid">✔ VALID CERTIFICATE</span><br><br>

        Name: ${data.name}<br>
        Track: ${data.track}<br>
        Score: ${data.score} / ${data.total}<br>
        Success Rate: ${data.percent}%<br>
        Status: ${data.status}
    `;
}

</script>

</body>
</html>
