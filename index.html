<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>CIA Mobile Training</title>

<style>
body{
    font-family: Tahoma;
    direction: rtl;
    margin:0;
    background: linear-gradient(135deg,#f6f2e7,#efe2c1,#f8f5ea);
}

/* الحاوية */
.container{
    max-width: 600px;
    margin: auto;
    padding: 10px;
}

/* العنوان */
h1{
    text-align:center;
    font-size:20px;
    color:#7a5a12;
    margin:10px 0;
}

/* كروت التحكم */
.card{
    background:#fff;
    padding:15px;
    margin:10px 0;
    border-radius:12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* كل سطر اختيار */
.row{
    margin:10px 0;
}

label{
    font-size:16px;
    display:block;
    margin-bottom:5px;
}

/* عناصر الإدخال */
select{
    width:100%;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
}

/* زر */
button{
    width:100%;
    padding:12px;
    font-size:18px;
    background:#b08d3c;
    color:#fff;
    border:none;
    border-radius:10px;
    margin-top:10px;
}

/* الأسئلة */
.question{
    background:#fff;
    padding:15px;
    margin:10px 0;
    border-radius:12px;
    box-shadow:0 1px 5px rgba(0,0,0,0.1);
}

.q-title{
    font-size:16px;
    font-weight:bold;
    margin-bottom:10px;
}

.options label{
    display:block;
    margin:8px 0;
    font-size:15px;
}

/* النتيجة */
.result{
    text-align:center;
    font-size:18px;
    margin:15px 0;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>نظام تدريب CIA - التدقيق الداخلي</h1>

<!-- إعدادات الاختبار -->
<div class="card">

<div class="row">
<label>اختر الجزء</label>
<select id="part">
<option value="all">كل الأجزاء</option>
<option value="1">الجزء الأول</option>
<option value="2">الجزء الثاني</option>
<option value="3">الجزء الثالث</option>
</select>
</div>

<div class="row">
<label>عدد الأسئلة</label>
<select id="count">
<option value="5">5</option>
<option value="10">10</option>
<option value="20">20</option>
<option value="30">30</option>
<option value="50">50</option>
</select>
</div>

<div class="row">
<label>المستوى</label>
<select id="level">
<option value="all">الكل</option>
<option value="easy">سهل</option>
<option value="medium">متوسط</option>
<option value="hard">صعب</option>
</select>
</div>

<button onclick="startExam()">بدء الاختبار</button>

</div>

<!-- الأسئلة -->
<div id="quiz"></div>

<button onclick="submitQuiz()">تصحيح الاختبار</button>

<div id="result" class="result"></div>

</div>

<script>

let questionBank = [];
let examQuestions = [];

// تحميل الأسئلة
fetch("cia-question-bank.json")
.then(res => res.json())
.then(data => {
    questionBank = data;
});

// بدء الاختبار
function startExam(){

    let part = document.getElementById("part").value;
    let level = document.getElementById("level").value;
    let count = parseInt(document.getElementById("count").value);

    let filtered = questionBank.filter(q => {
        return (part === "all" || q.part == part) &&
               (level === "all" || q.level == level);
    });

    filtered = filtered.sort(() => Math.random() - 0.5);

    examQuestions = filtered.slice(0, count);

    renderQuiz();

    document.getElementById("result").innerHTML = "";
}

// عرض الأسئلة
function renderQuiz(){

    let quiz = document.getElementById("quiz");
    quiz.innerHTML = "";

    examQuestions.forEach((q, i) => {

        let html = `
        <div class="question">
            <div class="q-title">${i+1}. ${q.q}</div>
            <div class="options">`;

        q.a.forEach((opt, j) => {
            html += `
            <label>
                <input type="radio" name="q${i}" value="${j}">
                ${opt}
            </label>`;
        });

        html += `</div></div>`;

        quiz.innerHTML += html;
    });
}

// التصحيح
function submitQuiz(){

    let score = 0;

    examQuestions.forEach((q, i) => {

        let selected = document.querySelector(`input[name="q${i}"]:checked`);

        if(selected && parseInt(selected.value) === q.c){
            score++;
        }
    });

    let percent = (score / examQuestions.length) * 100;

    let level =
        percent >= 85 ? "ممتاز" :
        percent >= 70 ? "جيد" : "يحتاج تحسين";

    document.getElementById("result").innerHTML =
        `النتيجة: ${score}/${examQuestions.length} (${percent.toFixed(1)}%) - ${level}`;
}

</script>

</body>
</html>
