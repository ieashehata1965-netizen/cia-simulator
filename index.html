<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>CIA Training System</title>

<style>
body{
    font-family: Tahoma;
    direction: rtl;
    background: linear-gradient(135deg,#f6f2e7,#efe2c1,#f8f5ea);
    margin:0;
}

.container{
    width: 900px;
    margin: 20px auto;
    background:#fff;
    padding: 20px;
    border: 10px solid #b08d3c;
}

h1{
    text-align:center;
    color:#7a5a12;
}

.controls{
    text-align:center;
    margin-bottom:15px;
}

select, button{
    padding:8px;
    margin:5px;
    font-size:16px;
}

.question{
    margin:15px 0;
    padding:10px;
    border-bottom:1px solid #ddd;
}

.options label{
    display:block;
    margin:5px 0;
}

.result{
    text-align:center;
    font-size:22px;
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>نظام تدريب CIA - صفحة واحدة</h1>

<div class="controls">

<select id="part">
<option value="all">كل الأجزاء</option>
<option value="1">Part 1</option>
<option value="2">Part 2</option>
<option value="3">Part 3</option>
</select>

<select id="level">
<option value="all">كل المستويات</option>
<option value="easy">سهل</option>
<option value="medium">متوسط</option>
<option value="hard">صعب</option>
</select>

<select id="count">
<option value="5">5</option>
<option value="10">10</option>
<option value="20">20</option>
<option value="30">30</option>
<option value="50">50</option>
</select>

<button onclick="startExam()">بدء الاختبار</button>

</div>

<div id="quiz"></div>

<button onclick="submitQuiz()">تصحيح</button>

<div id="result"></div>

</div>

<script>

let questionBank = [];
let examQuestions = [];

// تحميل الملف
fetch("cia-question-bank.json")
.then(res => res.json())
.then(data => {
    questionBank = data;
});

// بدء الاختبار
function startExam(){

    let part = document.getElementById("part").value;
    let level = document.getElementById("level").value;
    let count = parseInt(document.getElementById("count").value);

    let filtered = questionBank.filter(q => {

        return (part === "all" || q.part == part) &&
               (level === "all" || q.level == level);
    });

    filtered = filtered.sort(() => Math.random() - 0.5);

    examQuestions = filtered.slice(0, count);

    renderQuiz();

    document.getElementById("result").innerHTML = "";
}

// عرض الأسئلة (نفس الصفحة فقط)
function renderQuiz(){

    let quiz = document.getElementById("quiz");
    quiz.innerHTML = "";

    examQuestions.forEach((q, i) => {

        let html = `<div class="question">
            <div><b>${i+1}. ${q.q}</b></div>
            <div class="options">`;

        q.a.forEach((opt, j) => {
            html += `
            <label>
                <input type="radio" name="q${i}" value="${j}">
                ${opt}
            </label>`;
        });

        html += `</div></div>`;

        quiz.innerHTML += html;
    });
}

// التصحيح
function submitQuiz(){

    let score = 0;

    examQuestions.forEach((q, i) => {

        let selected = document.querySelector(`input[name="q${i}"]:checked`);

        if(selected && parseInt(selected.value) === q.c){
            score++;
        }
    });

    let percent = (score / examQuestions.length) * 100;

    let level =
        percent >= 85 ? "ممتاز" :
        percent >= 70 ? "جيد" : "يحتاج تحسين";

    document.getElementById("result").innerHTML =
        `النتيجة: ${score} / ${examQuestions.length} (${percent.toFixed(1)}%) - ${level}`;
}

</script>

</body>
</html>
