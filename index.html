<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>CIA Internal Audit Training</title>

<style>
body{
    font-family: Tahoma;
    direction: rtl;
    background: linear-gradient(135deg,#f6f2e7,#efe2c1,#f8f5ea);
    margin:0;
}

.container{
    width: 900px;
    margin: 30px auto;
    background:#fff;
    padding: 25px;
    border: 10px solid #b08d3c;
}

h1{
    text-align:center;
    color:#7a5a12;
}

.question{
    margin:15px 0;
    padding:10px;
    border-bottom:1px solid #ddd;
}

.options label{
    display:block;
    margin:5px 0;
    cursor:pointer;
}

button{
    display:block;
    margin:20px auto;
    padding:10px 25px;
    font-size:18px;
    cursor:pointer;
}

.result{
    text-align:center;
    font-size:22px;
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>اختبار التدقيق الداخلي (CIA)</h1>

<div id="quiz"></div>

<button onclick="submitQuiz()">عرض النتيجة</button>

<div id="result"></div>

</div>

<script>

let questionBank = [];
let examQuestions = [];

// ===== تحميل بنك الأسئلة من الملف الخارجي =====
fetch("cia-question-bank.json")
  .then(res => res.json())
  .then(data => {

      questionBank = data;

      // نبدأ بـ 5 أسئلة فقط (مرحلة تجريبية)
      examQuestions = questionBank.slice(0, 5);

      renderQuiz();
  });

// ===== عرض الأسئلة =====
function renderQuiz(){

    let quizDiv = document.getElementById("quiz");
    quizDiv.innerHTML = "";

    examQuestions.forEach((q, index) => {

        let html = `<div class="question">
            <div><b>${index + 1}. ${q.q}</b></div>
            <div class="options">`;

        q.a.forEach((opt, i) => {
            html += `
            <label>
                <input type="radio" name="q${index}" value="${i}">
                ${opt}
            </label>`;
        });

        html += `</div></div>`;

        quizDiv.innerHTML += html;
    });
}

// ===== التصحيح =====
function submitQuiz(){

    let score = 0;

    examQuestions.forEach((q, index) => {

        let selected = document.querySelector(`input[name="q${index}"]:checked`);

        if(selected && parseInt(selected.value) === q.c){
            score++;
        }
    });

    let resultText = "";

    if(score >= 4){
        resultText = "ممتاز";
    } else if(score >= 3){
        resultText = "جيد";
    } else {
        resultText = "يحتاج تحسين";
    }

    document.getElementById("result").innerHTML =
        `النتيجة: ${score} / ${examQuestions.length} - ${resultText}`;
}

</script>

</body>
</html>
