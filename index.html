<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Internal Audit Training Platform</title>

<style>
body{
    font-family: Tahoma;
    direction: rtl;
    margin:0;
    background: linear-gradient(135deg,#f6f2e7,#efe2c1,#f8f5ea);
}

.container{
    max-width:750px;
    margin:auto;
    padding:15px;
}

h1{
    text-align:center;
    color:#7a5a12;
    font-size:22px;
}

.card{
    background:#fff;
    padding:18px;
    margin:10px 0;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input,select,button{
    width:100%;
    padding:12px;
    margin:8px 0;
    font-size:16px;
    border-radius:10px;
    border:1px solid #ddd;
}

button{
    background:#b08d3c;
    color:#fff;
    border:none;
    font-weight:bold;
}

.q-box{
    background:#fff;
    padding:22px;
    margin:10px 0;
    border-radius:15px;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.q-title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

.option{
    padding:14px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ddd;
    cursor:pointer;
    background:#fafafa;
    font-size:18px;
}

.option:hover{
    background:#f0e6c8;
}

.result{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>منصة التدقيق الداخلي والتأهيل المهني</h1>

<div id="home" class="card">

<input id="studentName" placeholder="اسم المتدرب">

<!-- المسار -->
<select id="track">
<option value="cia">CIA</option>
<option value="cma">CMA</option>
<option value="cfa">CFA</option>
<option value="fmaa">FMAA</option>
</select>

<!-- الجزء الجديد -->
<select id="part">
<option value="all">كل الأجزاء</option>
<option value="1">الجزء الأول</option>
<option value="2">الجزء الثاني</option>
<option value="3">الجزء الثالث</option>
<option value="4">الجزء الرابع</option>
</select>

<select id="count">
<option value="5">5 أسئلة</option>
<option value="10">10 أسئلة</option>
<option value="20">20 سؤال</option>
<option value="30">30 سؤال</option>
<option value="50">50 سؤال</option>
</select>

<button onclick="startExam()">بدء الاختبار</button>

</div>

<div id="quiz"></div>
<div id="result" class="result"></div>

</div>

<script>

let bank = [];
let exam = [];
let index = 0;
let score = 0;
let student = "";
let track = "";
let part = "all";

// تحميل بنك الأسئلة
function loadBank(){
    return fetch(track + "-questions.json")
    .then(res => res.json())
    .then(data => {
        bank = data.sort(() => Math.random() - 0.5);
    });
}

// بدء الاختبار
async function startExam(){

    student = document.getElementById("studentName").value.trim();
    track = document.getElementById("track").value;
    part = document.getElementById("part").value;
    let count = parseInt(document.getElementById("count").value);

    if(!student){
        alert("أدخل اسم المتدرب");
        return;
    }

    await loadBank();

    // فلترة حسب الجزء
    let pool = bank.filter(q =>
        (part === "all" || q.part == part)
    );

    exam = pool.slice(0, count);

    index = 0;
    score = 0;

    document.getElementById("home").style.display = "none";

    showQuestion();
}

// سؤال واحد فقط
function showQuestion(){

    if(index >= exam.length){
        showResult();
        return;
    }

    let q = exam[index];

    let html = `
    <div class="q-box">
        <div class="q-title">${index+1}. ${q.q}</div>
    `;

    q.a.forEach((opt, i) => {
        html += `<div class="option" onclick="answer(${i})">${opt}</div>`;
    });

    html += `</div>`;

    document.getElementById("quiz").innerHTML = html;
}

// الإجابة
function answer(i){

    let q = exam[index];

    if(i === q.c){
        score++;
    }

    index++;
    setTimeout(showQuestion, 200);
}

// النتيجة
function showResult(){

    let percent = (score / exam.length) * 100;

    let level =
        percent >= 85 ? "ممتاز" :
        percent >= 70 ? "جيد" : "يحتاج تحسين";

    document.getElementById("quiz").innerHTML = "";

    document.getElementById("result").innerHTML = `
        اسم المتدرب: ${student}<br>
        النتيجة: ${score}/${exam.length}<br>
        النسبة: ${percent.toFixed(1)}%<br>
        التقييم: ${level}
    `;
}

</script>

</body>
</html>
