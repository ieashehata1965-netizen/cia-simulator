<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Internal Audit & GRC Academy</title>

<style>

body{
    font-family: Tahoma, Arial;
    margin:0;
    background: linear-gradient(135deg,#f6f2e7,#efe2c1,#f8f5ea);
}

/* ===== Layout ===== */
.container{
    max-width:850px;
    margin:auto;
    padding:15px;
}

/* ===== Header ===== */
header{
    text-align:center;
    padding:15px;
}

header h1{
    font-size:20px;
    color:#7a5a12;
    margin:5px;
}

header h2{
    font-size:14px;
    color:#555;
    font-weight:normal;
}

/* ===== Card ===== */
.card{
    background:#fff;
    padding:20px;
    margin:12px 0;
    border-radius:18px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* ===== Inputs ===== */
input,select{
    width:100%;
    padding:12px;
    margin:8px 0;
    font-size:15px;
    border-radius:10px;
    border:1px solid #ddd;
}

/* ===== Button ===== */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#b08d3c;
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

/* ===== Quiz ===== */
.q-box{
    background:#fff;
    padding:22px;
    margin-top:10px;
    border-radius:18px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.q-title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

.option{
    padding:14px;
    margin:10px 0;
    border-radius:10px;
    background:#f7f7f7;
    border:1px solid #ddd;
    cursor:pointer;
    font-size:17px;
}

.option:hover{
    background:#f0e6c8;
}

/* ===== Screens ===== */
.screen{display:none;}
.active{display:block;}

.small{
    font-size:13px;
    color:#666;
    text-align:center;
}

/* ===== Result ===== */
.result{
    text-align:center;
    font-size:20px;
    font-weight:bold;
    margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>Internal Audit & GRC Professional Academy</h1>
<h2>الأكاديمية المهنية للتدقيق الداخلي والحوكمة وإدارة المخاطر</h2>
</header>

<!-- ================= WELCOME ================= -->
<div id="welcome" class="screen active card">

<h2>مرحبًا بك 👋</h2>

<p class="small">
منصة تدريب احترافية في التدقيق الداخلي والشهادات المهنية.<br>
اختر نوع الاختبار ثم ابدأ فورًا.
</p>

<button onclick="goSetup()">بدء الاستخدام</button>

</div>

<!-- ================= SETUP ================= -->
<div id="setup" class="screen card">

<h2>إعداد الاختبار</h2>

<input id="studentName" placeholder="اسم المتدرب">

<select id="track">
<option value="cia">CIA - التدقيق الداخلي</option>
<option value="cma">CMA - المحاسبة الإدارية</option>
<option value="cfa">CFA - التحليل المالي</option>
<option value="fmaa">FMAA - المحاسبة المالية</option>
</select>

<select id="part">
<option value="all">كل الأجزاء</option>
<option value="1">الجزء الأول</option>
<option value="2">الجزء الثاني</option>
<option value="3">الجزء الثالث</option>
<option value="4">الجزء الرابع</option>
</select>

<select id="mode" onchange="toggleMode()">
<option value="quick">تدريب سريع (5)</option>
<option value="practice">اختبار تدريبي (20)</option>
<option value="mock">اختبار محاكاة (50)</option>
<option value="full">⭐ اختبار كامل (Full Exam)</option>
</select>

<div id="countBox">
<select id="count">
<option value="5">5 أسئلة</option>
<option value="10">10 أسئلة</option>
<option value="20">20 سؤال</option>
<option value="30">30 سؤال</option>
<option value="50">50 سؤال</option>
</select>
</div>

<button onclick="startExam()">ابدأ الاختبار</button>

</div>

<!-- ================= QUIZ ================= -->
<div id="quiz" class="screen"></div>

<!-- ================= RESULT ================= -->
<div id="result" class="result"></div>

</div>

<script>

/* ================= CORE ENGINE ================= */

let bank=[];
let exam=[];
let index=0;
let score=0;

let student="";
let track="";
let part="all";

function showScreen(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* ===== WELCOME ===== */
function goSetup(){
    showScreen("setup");
}

/* ===== TOGGLE MODE ===== */
function toggleMode(){
    let mode=document.getElementById("mode").value;
    document.getElementById("countBox").style.display =
        (mode==="full") ? "none" : "block";
}

/* ===== LOAD BANK ===== */
async function loadBank(){
    try{
        const res = await fetch("cia-question-bank.json")
        const data = await res.json();
        bank = data;
    }catch(e){
        alert("خطأ في تحميل بنك الأسئلة");
    }
}

/* ===== START ===== */
async function startExam(){

    student=document.getElementById("studentName").value.trim();
    track=document.getElementById("track").value;
    part=document.getElementById("part").value;
    let mode=document.getElementById("mode").value;
    let count=parseInt(document.getElementById("count").value);

    if(!student){
        alert("أدخل اسم المتدرب");
        return;
    }

    await loadBank();

console.log("Questions Loaded:", bank.length);

    let pool=bank.filter(q =>
        (part==="all" || q.part==part)
    );

    if(mode==="full"){
        exam=pool;
    }
    else if(mode==="quick"){
        exam=pool.sort(()=>Math.random()-0.5).slice(0,5);
    }
    else if(mode==="practice"){
        exam=pool.sort(()=>Math.random()-0.5).slice(0,20);
    }
    else if(mode==="mock"){
        exam=pool.sort(()=>Math.random()-0.5).slice(0,50);
    }
    else{
        exam=pool.sort(()=>Math.random()-0.5).slice(0,count);
    }

    index=0;
    score=0;

    showScreen("quiz");
    showQuestion();
}

/* ===== QUESTION ===== */
function showQuestion(){

    if(index>=exam.length){
        showResult();
        return;
    }

    let q=exam[index];

    let html=`
    <div class="q-box">
        <div class="q-title">${index+1}. ${q.q}</div>
    `;

    q.a.forEach((o,i)=>{
        html+=`<div class="option" onclick="answer(${i})">${o}</div>`;
    });

    html+=`</div>`;

    document.getElementById("quiz").innerHTML=html;
}

/* ===== ANSWER ===== */
function answer(i){
    if(i===exam[index].c) score++;
    index++;
    setTimeout(showQuestion,200);
}

/* ===== RESULT ===== */
function showResult(){

    let percent=Math.round((score/exam.length)*100);

    let level=
        percent>=85 ? "ممتاز" :
        percent>=70 ? "جيد" :
        "يحتاج تطوير";

    document.getElementById("quiz").innerHTML="";

    document.getElementById("result").innerHTML=`
        <div class="card">
        <h2>النتيجة النهائية</h2>
        <p>المتدرب: ${student}</p>
        <p>النتيجة: ${score} / ${exam.length}</p>
        <p>النسبة: ${percent}%</p>
        <p>التقييم: ${level}</p>
        </div>
    `;
}

</script>

</body>
</html>
