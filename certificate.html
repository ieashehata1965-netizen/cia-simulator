<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificate</title>

<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>

<style>

/* ===== General ===== */
body{
    font-family: Tahoma, Arial;
    margin:0;
    background: linear-gradient(135deg,#f6f2e7,#efe2c1,#f8f5ea);
}

/* ===== Certificate Box ===== */
.cert{
    width:794px;
    height:1123px;
    margin:0 auto;
    background:#fff;
    padding:40px;
    border-radius:18px;
    border:10px double #b08d3c;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
    position:relative;
    overflow:hidden;
    box-sizing:border-box;

    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

/* Watermark */
.cert::before{
    content:"GRC ACADEMY";
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:60px;
    color:rgba(0,0,0,0.05);
    font-weight:bold;
    pointer-events:none;
}

/* Text */
h1{
    color:#7a5a12;
}

h2{
    font-size:16px;
    color:#555;
    font-weight:normal;
}

.info{
    margin:10px 0;
    font-size:18px;
    position:relative;
    z-index:2;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:20px;
}

.badge{
    font-size:22px;
    font-weight:bold;
    color:#166534;
    margin-top:10px;
}

.small{
    font-size:14px;
    color:#666;
}

/* QR */
#qr{
    margin-top:15px;
}

/* Seal */
.seal{
    margin-top:20px;
    display:inline-block;
    padding:10px 20px;
    border:3px solid #b08d3c;
    border-radius:50%;
    font-weight:bold;
    color:#7a5a12;
}

/* Button */
button{
    margin-top:20px;
    padding:12px;
    width:100%;
    border:none;
    border-radius:10px;
    background:#b08d3c;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

/* ===== Print Fix (ONE PAGE) ===== */
@media print{

    @page{
        size: A4;
        margin:0;
    }

    body{
        margin:0;
        padding:0;
        background:#fff;
    }

    button{
        display:none !important;
    }

    .cert{
        box-shadow:none;
        transform: scale(0.80);
        transform-origin: top center;
        overflow:hidden;
        page-break-inside: avoid;
        break-inside: avoid;
    }
}

</style>
</head>

<body>

<div class="cert">

<h1>Internal Audit & GRC Professional Academy</h1>
<h2>الأكاديمية المهنية للتدقيق الداخلي والحوكمة وإدارة المخاطر</h2>

<hr>

<div class="info" id="name"></div>

<div class="grid">
    <div class="info" id="score"></div>
    <div class="info" id="percent"></div>
</div>

<div class="badge" id="level"></div>

<div class="info small" id="certId"></div>

<div id="qr"></div>

<div class="seal">APPROVED</div>

<button onclick="window.print()">Print Certificate</button>

</div>

<script>

/* ===== DATA ===== */
const params = new URLSearchParams(window.location.search);

let name = params.get("name") || "Unknown";
let score = parseInt(params.get("score") || 0);
let total = parseInt(params.get("total") || 0);

/* ===== CALC ===== */
let percent = total ? Math.round((score / total) * 100) : 0;

let level =
    percent >= 85 ? "Excellent (ممتاز)" :
    percent >= 70 ? "Good (جيد)" :
    "Needs Improvement (يحتاج تطوير)";

/* ===== CERT ID ===== */
let certId = "CIA-" + Date.now().toString().slice(-8);

/* ===== FILL ===== */
document.getElementById("name").innerHTML = "Name: " + name;
document.getElementById("score").innerHTML = "Score: " + score + " / " + total;
document.getElementById("percent").innerHTML = "Rate: " + percent + "%";
document.getElementById("level").innerHTML = level;
document.getElementById("certId").innerHTML = "Certificate ID: " + certId;

/* ===== QR ===== */
new QRCode(document.getElementById("qr"), {
    text: window.location.href,
    width: 140,
    height: 140
});

</script>

</body>
</html>
