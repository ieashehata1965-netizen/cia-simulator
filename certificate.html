<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>شهادة أكاديمية التدقيق الداخلي</title>

<style>
body{
    margin:0;
    font-family: "Tahoma", sans-serif;
    direction: rtl;
    background: linear-gradient(135deg,#f6f2e7,#efe2c1,#f8f5ea);
}

/* الشهادة */
.certificate{
    width: 900px;
    margin: 40px auto;
    padding: 40px;
    border: 12px solid #b08d3c;
    background: #fff;
    position: relative;
    text-align: center;
}

/* إطار زخرفي */
.certificate:before{
    content:"";
    position:absolute;
    top:10px; left:10px; right:10px; bottom:10px;
    border:3px solid #d4af37;
    pointer-events:none;
}

/* العنوان */
h1{
    margin-top: 10px;
    color:#7a5a12;
}

/* النص */
p{
    font-size:20px;
    margin:10px 0;
}

/* اسم المستخدم */
.name{
    font-size:28px;
    font-weight:bold;
    color:#000;
    margin:20px 0;
}

/* النتيجة */
.result{
    font-size:22px;
    padding:10px;
    margin:20px auto;
    display:inline-block;
    border-radius:8px;
}

/* حالات النتيجة */
.excellent{background:#d4edda;color:#155724;}
.good{background:#fff3cd;color:#856404;}
.weak{background:#f8d7da;color:#721c24;}

/* ختم */
.stamp{
    position:absolute;
    bottom:40px;
    left:60px;
    width:120px;
    height:120px;
    border:4px solid #b22222;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    color:#b22222;
    transform: rotate(-15deg);
}

/* زر */
button{
    display:block;
    margin:20px auto;
    padding:10px 25px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="certificate" id="cert">

    <h1>أكاديمية التدريب على التدقيق الداخلي</h1>
    <h3>Internal Audit Training Academy</h3>

    <p>تشهد الأكاديمية بأن:</p>

    <div class="name" id="userName">اسم المتدرب</div>

    <p>ابنُ أحمدَ محمدٍ قد أتمَّ اختباراتِ التدريبِ على أسئلةِ التدقيقِ الداخليِّ للجزءِ الأولِ من شهادةِ CIA بنجاح.</p>

    <div id="resultBox" class="result excellent">النتيجة: 90%</div>

    <p>تاريخ الإصدار: <span id="date"></span></p>

    <div class="stamp">ختم الأكاديمية</div>

</div>

<button onclick="printCert()">طباعة الشهادة</button>

<script>
// اسم المتدرب
let name = "أحمد محمد";
document.getElementById("userName").innerText = name;

// النتيجة
let score = 85;
let box = document.getElementById("resultBox");
box.innerText = "النتيجة: " + score + "%";

if(score >= 85){
    box.className = "result excellent";
    box.innerText += " - ممتاز";
}else if(score >= 70){
    box.className = "result good";
    box.innerText += " - جيد";
}else{
    box.className = "result weak";
    box.innerText += " - يحتاج تحسين";
}

// التاريخ
document.getElementById("date").innerText =
new Date().toLocaleDateString("ar-EG");

// الطباعة
function printCert(){
    window.print();
}
</script>

</body>
</html>
