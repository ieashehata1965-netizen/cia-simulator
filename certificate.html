<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Smart Certificate</title>

<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>

<style>
body{
    font-family: Tahoma;
    direction: rtl;
    background: linear-gradient(135deg,#f6f2e7,#efe2c1,#f8f5ea);
    margin:0;
    padding:20px;
}

.card{
    max-width:800px;
    margin:auto;
    background:#fff;
    padding:30px;
    border-radius:18px;
    box-shadow:0 5px 18px rgba(0,0,0,0.15);
    border:8px double #b08d3c;
    text-align:center;
}

h1{
    color:#7a5a12;
}

.info{
    font-size:18px;
    margin:10px 0;
    line-height:1.8;
}

.badge{
    font-size:20px;
    font-weight:bold;
    color:#166534;
    margin-top:10px;
}

#qr{
    margin:20px auto;
}

button{
    padding:12px 20px;
    font-size:16px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#b08d3c;
    color:#fff;
    cursor:pointer;
}

/* الطباعة */
@media print{
    button{display:none;}
    body{background:#fff;}
}
</style>
</head>

<body>

<div class="card">

<h1>شهادة إتمام التدريب المهني</h1>

<div class="info" id="name"></div>
<div class="info" id="track"></div>
<div class="info" id="part"></div>
<div class="info" id="score"></div>

<div class="badge" id="level"></div>

<div id="qr"></div>

<div class="info" id="certId"></div>

<button onclick="window.print()">طباعة الشهادة</button>

</div>

<script>

// قراءة البيانات من الرابط
const params = new URLSearchParams(window.location.search);

let name = params.get("name");
let track = params.get("track");
let part = params.get("part");
let score = params.get("score");
let total = params.get("total");

// حساب النسبة
let percent = Math.round((score/total)*100);

// تقييم
let level =
    percent >= 85 ? "ممتاز" :
    percent >= 70 ? "جيد" : "يحتاج تحسين";

// رقم شهادة ذكي
let certId = track.toUpperCase() + "-" + Date.now();

// عرض البيانات
document.getElementById("name").innerHTML = "اسم المتدرب: " + name;
document.getElementById("track").innerHTML = "المسار: " + track;
document.getElementById("part").innerHTML = "الجزء: " + part;
document.getElementById("score").innerHTML = "النتيجة: " + score + " / " + total;
document.getElementById("level").innerHTML = "التقييم: " + level;
document.getElementById("certId").innerHTML = "رقم الشهادة: " + certId;

// QR Code للتحقق
new QRCode(document.getElementById("qr"), {
    text: certId,
    width: 140,
    height: 140
});

</script>

</body>
</html>
