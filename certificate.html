<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificate</title>

<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>

<style>

/* ===== General ===== */
body{
    font-family: Tahoma, Arial;
    margin:0;
    background: linear-gradient(135deg,#f6f2e7,#efe2c1,#f8f5ea);
}

/* ===== Certificate Box ===== */
.cert{
    width:794px;
    height:1123px;
    margin:0 auto;
    background:#fff;
    padding:40px;
    border-radius:18px;
    border:10px double #b08d3c;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
    position:relative;
    overflow:hidden;
    box-sizing:border-box;

    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

/* Watermark */
.cert::before{
    content:"GRC ACADEMY";
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:60px;
    color:rgba(0,0,0,0.05);
    font-weight:bold;
    pointer-events:none;
}

/* Logo Section */
.logo-section{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin-bottom:15px;
    position:relative;
    z-index:2;
}

.logo-container{
    width:100px;
    height:100px;
    background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #d4af37 50%, #d4af37 100%);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow: 0 4px 15px rgba(27, 94, 32, 0.4), inset 0 2px 8px rgba(212, 175, 55, 0.3);
    position:relative;
    border:3px solid #d4af37;
}

.logo-container::after{
    content:"✓";
    font-size:50px;
    color:#fff;
    font-weight:bold;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}

.logo-text{
    text-align:center;
}

.logo-text h3{
    margin:0;
    color:#1b5e20;
    font-size:14px;
    font-weight:bold;
    line-height:1.3;
}

.logo-text p{
    margin:4px 0 0 0;
    color:#2e7d32;
    font-size:12px;
    font-weight:600;
}

/* Text */
h1{
    color:#1b5e20;
    margin:10px 0 5px 0;
    font-size:24px;
}

h2{
    font-size:16px;
    color:#2e7d32;
    font-weight:normal;
    margin:5px 0 10px 0;
}

.info{
    margin:10px 0;
    font-size:18px;
    position:relative;
    z-index:2;
    color:#333;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:20px;
}

.badge{
    font-size:22px;
    font-weight:bold;
    color:#1b5e20;
    margin-top:10px;
    padding:8px;
    background: linear-gradient(135deg, rgba(27, 94, 32, 0.1), rgba(212, 175, 55, 0.1));
    border-radius:8px;
}

.small{
    font-size:14px;
    color:#666;
}

/* QR */
#qr{
    margin-top:15px;
    display:flex;
    justify-content:center;
    position:relative;
    z-index:2;
}

/* Seal - Professional Circular Seal */
.seal-container{
    position:relative;
    width:200px;
    height:200px;
    margin:15px auto;
    display:flex;
    align-items:center;
    justify-content:center;
}

.seal{
    position:relative;
    width:180px;
    height:180px;
    border:4px solid #d4af37;
    border-radius:50%;
    background: conic-gradient(from 0deg, #1b5e20 0%, #2e7d32 45%, #d4af37 45%, #d4af37 55%, #1b5e20 55%, #1b5e20 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow: 0 8px 25px rgba(0,0,0,0.35), 
                inset 0 0 20px rgba(212, 175, 55, 0.3),
                0 0 40px rgba(27, 94, 32, 0.15);
    animation: rotateSeal 40s linear infinite;
}

@keyframes rotateSeal{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

.seal-inner{
    position:absolute;
    width:160px;
    height:160px;
    border:3px dashed #d4af37;
    border-radius:50%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:radial-gradient(circle, rgba(27, 94, 32, 0.12) 0%, rgba(27, 94, 32, 0.05) 100%);
}

.seal-text{
    text-align:center;
    color:#fff;
    font-weight:bold;
    text-shadow: 0 2px 5px rgba(0,0,0,0.4);
    animation: reverseRotate 40s linear infinite;
}

@keyframes reverseRotate{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(-360deg);
    }
}

.seal-text-en{
    font-size:13px;
    letter-spacing:2px;
    margin-bottom:3px;
}

.seal-text-ar{
    font-size:12px;
    letter-spacing:1px;
    margin-top:3px;
}

.seal-star{
    font-size:18px;
    color:#d4af37;
    margin:2px 0;
    animation: reverseRotate 40s linear infinite;
}

/* Decorative Line */
.divider{
    border:0;
    height:2px;
    background: linear-gradient(to right, transparent, #d4af37, transparent);
    margin:15px 0;
}

/* Button */
button{
    margin-top:20px;
    padding:12px;
    width:100%;
    border:none;
    border-radius:10px;
    background: linear-gradient(135deg, #b08d3c, #d4af37);
    color:#fff;
    font-size:16px;
    cursor:pointer;
    position:relative;
    z-index:2;
    font-weight:bold;
    transition: all 0.3s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

button:hover{
    background: linear-gradient(135deg, #9a7a35, #c99d2e);
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    transform: translateY(-2px);
}

/* ===== Print Fix (ONE PAGE) ===== */
@media print{

    @page{
        size: A4;
        margin:0;
    }

    body{
        margin:0;
        padding:0;
        background:#fff;
    }

    button{
        display:none !important;
    }

    .cert{
        box-shadow:none;
        transform: scale(0.80);
        transform-origin: top center;
        overflow:hidden;
        page-break-inside: avoid;
        break-inside: avoid;
    }

    .seal{
        animation:none;
    }

    .seal-text, .seal-star{
        animation:none;
    }

    /* تكبير جميع النصوص العربية والإنجليزية عند الطباعة */
    h1{
        font-size:28px !important;
        font-weight:bold !important;
        color:#1b5e20 !important;
    }

    h2{
        font-size:22px !important;
        font-weight:bold !important;
        color:#2e7d32 !important;
    }

    .logo-container{
        width:120px !important;
        height:120px !important;
    }

    .logo-container::after{
        font-size:60px !important;
    }

    .logo-text h3{
        font-size:16px !important;
    }

    .logo-text p{
        font-size:14px !important;
    }

    .info{
        font-size:20px !important;
        font-weight:bold !important;
    }

    .badge{
        font-size:24px !important;
        font-weight:bold !important;
    }

    .small{
        font-size:18px !important;
        font-weight:bold !important;
    }

    .seal-container{
        width:220px !important;
        height:220px !important;
    }

    .seal{
        width:200px !important;
        height:200px !important;
        border-width:5px !important;
    }

    .seal-inner{
        width:180px !important;
        height:180px !important;
        border-width:3px !important;
    }

    .seal-text-en{
        font-size:15px !important;
        letter-spacing:2px !important;
    }

    .seal-text-ar{
        font-size:14px !important;
        letter-spacing:1px !important;
    }

    .seal-star{
        font-size:22px !important;
    }

    .print-only{
        display:block !important;
    }
}
</style>
</head>
    
<body>

<div class="cert">

<!-- Logo Section -->
<div class="logo-section">
    <div class="logo-container"></div>
    <div class="logo-text">
        <h3>Internal Audit & GRC<br>Professional Academy</h3>
        <p>الأكاديمية المهنية للتدقيق الداخلي</p>
    </div>
</div>

<h1>Certificate of Achievement</h1>
<h2>شهادة إنجاز وتميز</h2>

<div class="divider"></div>

<div class="info" id="name"></div>

<div class="grid">
    <div class="info" id="score"></div>
    <div class="info" id="percent"></div>
</div>

<div class="badge" id="level"></div>

<div class="info small" id="certId"></div>

<div id="qr"></div>

<!-- Professional Circular Seal -->
<div class="seal-container">
    <div class="seal">
        <div class="seal-inner">
            <div class="seal-star">★</div>
            <div class="seal-text">
                <div class="seal-text-en">CERTIFIED</div>
                <div class="seal-text-ar">معتمد</div>
            </div>
            <div class="seal-star">★</div>
        </div>
    </div>
</div>

<div class="info small print-only">
Issued by: Chief Executive Officer – Internal Audit & GRC Academy
</div>

<button onclick="window.print()">Print Certificate</button>

</div>

<script>

/* ===== DATA ===== */
const params = new URLSearchParams(window.location.search);

let name = params.get("name") || "Unknown";
let score = parseInt(params.get("score") || 0);
let total = parseInt(params.get("total") || 0);

/* ===== CALC ===== */
let percent = total ? Math.round((score / total) * 100) : 0;

let level =
    percent >= 85 ? "Excellent (ممتاز)" :
    percent >= 70 ? "Good (جيد)" :
    "Needs Improvement (يحتاج تطوير)";

/* ===== CERT ID ===== */
let certId = "CIA-" + Date.now().toString().slice(-8);

/* ===== FILL ===== */
document.getElementById("name").innerHTML = "Name: " + name;
document.getElementById("score").innerHTML = "Score: " + score + " / " + total;
document.getElementById("percent").innerHTML = "Rate: " + percent + "%";
document.getElementById("level").innerHTML = level;
document.getElementById("certId").innerHTML = "Certificate ID: " + certId;

/* ===== QR ===== */
new QRCode(document.getElementById("qr"), {
    text: window.location.href,
    width: 140,
    height: 140
});

</script>

</body>
</html>
